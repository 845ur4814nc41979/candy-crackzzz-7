kind = "web"
previewPath = "/"
title = "Candy Crackzzz"
version = "1.0.0"
id = "artifacts/candy-crackzzz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
# localPort must match FRONTEND_PORT from userenv.shared (5001).
# goval starts Vite via the dev command using userenv env vars,
# so Vite binds on FRONTEND_PORT=5001. The artifact-router then
# routes the public domain "/" to this local port.
localPort = 5001

[services.development]
run = "pnpm --filter @workspace/candy-crackzzz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/candy-crackzzz", "run", "build" ]
publicDir = "artifacts/candy-crackzzz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5001"
BASE_PATH = "/"
