kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
# localPort must match API_PORT from userenv.shared (3001).
# goval environment has API_PORT=3001; Vite proxies /api to that port.
# The artifact-router also starts the API dev server with PORT=3001
# (from [services.env]) so both Vite proxy and artifact routing align.
localPort = 3001
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.env]
PORT = "3001"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "3001"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
